# Nombre de la aplicación
spring.application.name=sistema-venta-pollo

# Configuración de base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/venta-pollo

#Credenciales del usuario de BD
spring.datasource.username=usuario_prueba
