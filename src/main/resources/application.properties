# Nombre de la aplicaci\u00f3n
spring.application.name=sistema-venta-pollo

# Configuración de base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ventapollo

#Credenciales del usuario de BD
spring.datasource.username=usuario_pollo
spring.datasource.password=pollo123.

# Propiedades JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Propiedades para el log
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace