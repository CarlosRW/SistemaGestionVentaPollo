<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Mis Pedidos | Pollos Hermanos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            body {
                background:#f3f4f6;
            }
            .card-pedido {
                border:none;
                border-radius:16px;
                transition:.2s;
            }
            .card-pedido:hover {
                box-shadow:0 8px 24px rgba(0,0,0,.1) !important;
            }
        </style>
    </head>
    <body>
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="container py-4" style="max-width:800px;">
            <div class="d-flex align-items-center gap-3 mb-4">
                <span style="font-size:2rem;">📋</span>
                <div>
                    <h1 class="fw-bold mb-0" style="color:#14532d;">Mis Pedidos</h1>
                    <p class="text-muted mb-0 small">Historial de todas tus compras</p>
                </div>
            </div>

            <!-- Sin pedidos -->
            <div th:if="${#lists.isEmpty(pedidos)}" class="text-center py-5">
                <div style="font-size:4rem;">🍗</div>
                <h4 class="text-muted mt-3">Aún no has hecho pedidos</h4>
                <p class="text-muted">¡Explorá el menú y hacé tu primer pedido!</p>
                <a th:href="@{/producto/listado}" class="btn btn-success fw-bold px-4">Ver Menú</a>
            </div>

            <!-- Lista de pedidos -->
            <div th:each="p : ${pedidos}" class="card card-pedido shadow-sm mb-3 p-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div>
                        <h5 class="fw-bold mb-1">
                            Pedido #<span th:text="${p.id}"></span>
                        </h5>
                        <p class="text-muted small mb-0">
                            <i class="bi bi-calendar3 me-1"></i>
                            <span th:text="${#dates.format(p.fechaPedido, 'dd/MM/yyyy HH:mm')}">--</span>
                        </p>
                    </div>
                    <div class="text-end">
                        <div class="badge bg-success mb-2" th:text="${p.estado}">CONFIRMADO</div>
                        <h4 class="fw-bold text-success mb-0">
                            ₡<span th:text="${#numbers.formatInteger(p.total, 0, 'COMMA')}"></span>
                        </h4>
                    </div>
                </div>
                <hr class="my-3">
                <div class="d-flex justify-content-end">
                    <a th:href="@{/factura/}+${p.id}" class="btn btn-outline-success btn-sm">
                        <i class="bi bi-receipt me-1"></i> Ver Factura
                    </a>
                </div>
            </div>

            <div class="text-center mt-3 no-print" th:if="${!#lists.isEmpty(pedidos)}">
                <a th:href="@{/producto/listado}" class="btn btn-success fw-bold px-4">
                    <i class="bi bi-plus-circle me-1"></i> Hacer otro pedido
                </a>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
