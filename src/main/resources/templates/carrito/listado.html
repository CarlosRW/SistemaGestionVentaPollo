<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Carrito VentaPollo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">Tu Pedido</h2>
        <div class="row">
            <div class="col-md-8">
                <table class="table bg-white shadow-sm">
                    <thead class="table-dark">
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <td th:text="${item.nombre}"></td>
                            <td th:text="${'₡' + item.precio}"></td>
                            <td th:text="${item.cantidad}"></td>
                            <td th:text="${'₡' + (item.precio * item.cantidad)}"></td>
                            <td>
                                <a th:href="@{/carrito/eliminar/}+${item.id}" class="btn btn-danger btn-sm">Eliminar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4>Total</h4>
                        <h2 class="text-primary" th:text="${'₡' + carritoTotal}"></h2>
                        <button class="btn btn-success w-100 mt-3">Finalizar Compra</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
