<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menú de Productos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4 text-center">Menú de Productos</h2>

        <div class="row">
            <div class="col-md-3 mb-4" th:each="producto : ${productos}">
                <div class="card h-100 shadow-sm">
                    <img th:src="${producto.imagenUrl}" 
                         class="card-img-top" 
                         alt="Imagen del producto"
                         style="height:200px; object-fit:cover;">

                    <div class="card-body">
                        <h5 class="card-title" th:text="${producto.nombre}">Nombre</h5>
                        <p class="card-text" th:text="${producto.descripcion}">Descripción</p>
                        <p class="fw-bold text-success" th:text="${'₡' + #numbers.formatInteger(producto.precio, 0, 'COMMA')}">₡0</p>

                        <a th:href="@{/carrito/agregar/{id}(id=${producto.id})}" 
                           class="btn btn-danger w-100">
                            Agregar al carrito
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/carrito/listado}" class="btn btn-dark">Ver carrito</a>
        </div>
    </div>
</body>
</html>
