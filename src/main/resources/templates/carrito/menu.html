<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Menú de Productos</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <h2 class="mb-4 text-center">Menú de Productos</h2>

            <div class="row">
                <div class="col-md-3 mb-4" th:each="producto : ${productos}">
                    <div class="card h-100 shadow-sm">
                        <img th:src="${producto.imagenUrl}" 
                             class="card-img-top" 
                             alt="Imagen del producto"
                             style="height:200px; object-fit:cover;">

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${producto.nombre}">Nombre</h5>
                            <p class="card-text text-muted" th:text="${producto.descripcion}">Descripción</p>

                            <p class="fw-bold mt-auto" 
                               style="color: #198754;" 
                               th:text="${'₡' + #numbers.formatInteger(producto.precio, 0, 'COMMA')}">
                                ₡0
                            </p>

                            <a th:href="@{/carrito/agregar/{id}(id=${producto.id})}" class="btn w-100" style="background-color: #198754; color: white; border: none;">
                                Agregar al carrito
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/carrito/listado}" class="btn text-white" style="background-color: #198754; padding: 10px 30px;">
                    Ver carrito
                </a>
            </div>
        </div>
    </body>
</html>
