<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Formulario Producto</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <div class="container mt-5">
            <div class="card shadow p-4">
                <h2 class="text-danger mb-4">Formulario de Producto</h2>

                <form th:action="@{/producto/guardar}" th:object="${producto}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <input type="text" class="form-control" th:field="*{descripcion}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Imagen URL</label>
                        <input type="text" class="form-control" th:field="*{imagenUrl}">
                    </div>

                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a th:href="@{/producto/listado}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>

    </body>
</html>
