<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Menú Venta Pollo</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

        <div class="container mt-5">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="text-danger fw-bold">🍗 Menú de Pollos</h1>
                <div>
                    <a th:href="@{/producto/nuevo}" class="btn btn-success">Nuevo Producto</a>
                    <a th:href="@{/carrito/listado}" class="btn btn-dark">Ver Carrito 🛒</a>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <form th:action="@{/producto/buscar}" method="get" class="d-flex">
                        <input type="text" name="nombre" class="form-control me-2" placeholder="Buscar por nombre">
                        <button type="submit" class="btn btn-primary">Buscar</button>
                    </form>
                </div>

                <div class="col-md-6">
                    <form th:action="@{/producto/precio}" method="get" class="d-flex">
                        <input type="number" step="0.01" name="min" class="form-control me-2" placeholder="Precio mínimo">
                        <input type="number" step="0.01" name="max" class="form-control me-2" placeholder="Precio máximo">
                        <button type="submit" class="btn btn-secondary">Filtrar</button>
                    </form>
                </div>
            </div>

            <div class="mb-4">
                <a th:href="@{/producto/listado}" class="btn btn-outline-dark">Mostrar Todos</a>
                <a th:href="@{/producto/ordenados}" class="btn btn-outline-primary">Ordenar por Precio</a>
            </div>

            <div class="row">
                <div class="col-md-4 mb-4" th:each="p : ${productos}">
                    <div class="card h-100 shadow border-0">
                        <div class="card-body text-center">
                            <h3 class="card-title" th:text="${p.nombre}">Combo</h3>
                            <p class="card-text text-muted" th:text="${p.descripcion}">Descripción</p>
                            <h4 class="text-success">₡<span th:text="${p.precio}">0</span></h4>

                            <div class="d-grid gap-2 mt-3">
                                <a th:href="@{/carrito/agregar/}+${p.id}" class="btn btn-warning fw-bold">
                                    Añadir al Pedido
                                </a>

                                <a th:href="@{/producto/editar/{id}(id=${p.id})}" class="btn btn-info">
                                    Editar
                                </a>

                                <a th:href="@{/producto/eliminar/{id}(id=${p.id})}" 
                                   class="btn btn-danger"
                                   onclick="return confirm('¿Desea eliminar este producto?');">
                                    Eliminar
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </body>
</html>
