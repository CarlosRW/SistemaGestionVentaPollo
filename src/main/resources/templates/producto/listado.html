<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menú Venta Pollo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="text-danger fw-bold">🍗 Menú de Pollos</h1>
        <a th:href="@{/carrito/listado}" class="btn btn-dark">Ver Carrito 🛒</a>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="p : ${productos}">
            <div class="card h-100 shadow border-0">
                <div class="card-body text-center">
                    <h3 class="card-title" th:text="${p.nombre}">Combo</h3>
                    <p class="card-text text-muted" th:text="${p.descripcion}">Descripción</p>
                    <h4 class="text-success">₡<span th:text="${p.precio}">0</span></h4>
                    
                    <a th:href="@{/carrito/agregar/}+${p.id}" class="btn btn-warning mt-2 w-100 fw-bold">
                        Añadir al Pedido
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
