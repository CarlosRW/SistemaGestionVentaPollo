<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Menú | Pollos Hermanos</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
        <style>
            body {
                background:#f3f4f6;
            }
            .card-producto {
                border:none;
                border-radius:16px;
                transition:.2s;
            }
            .card-producto:hover {
                transform:translateY(-5px);
                box-shadow:0 12px 28px rgba(0,0,0,.13) !important;
            }
            .card-producto img {
                height:185px;
                object-fit:cover;
                border-radius:16px 16px 0 0;
            }
            .badge-cat {
                font-size:11px;
                background:#dcfce7;
                color:#166534;
                border-radius:20px;
                padding:3px 10px;
            }
        </style>
    </head>
    <body>
        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="container mt-4 pb-5">

            <!-- Alertas flash -->
            <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <div>
                    <h1 class="fw-bold mb-0" style="color:#14532d;">🍗 Menú de Pollos</h1>
                    <p class="text-muted mb-0 small">Elegí lo que te gusta y armá tu pedido</p>
                </div>
                <!-- Solo ADMIN ve botón de nuevo producto -->
                <a th:if="${session.usuarioLogueado != null and session.usuarioLogueado.esAdmin()}"
                   th:href="@{/producto/nuevo}" class="btn btn-success fw-bold">
                    <i class="bi bi-plus-circle me-1"></i> Nuevo Producto
                </a>
            </div>

            <!-- Filtros -->
            <div class="row g-3 mb-4">
                <div class="col-md-5">
                    <form th:action="@{/producto/buscar}" method="get" class="d-flex">
                        <input type="text" name="nombre" class="form-control me-2" placeholder="Buscar producto...">
                        <button class="btn btn-primary px-3"><i class="bi bi-search"></i></button>
                    </form>
                </div>
                <div class="col-md-5">
                    <form th:action="@{/producto/precio}" method="get" class="d-flex gap-2">
                        <input type="number" step="0.01" name="min" class="form-control" placeholder="₡ Mín.">
                        <input type="number" step="0.01" name="max" class="form-control" placeholder="₡ Máx.">
                        <button class="btn btn-secondary">Filtrar</button>
                    </form>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <a th:href="@{/producto/listado}" class="btn btn-outline-dark flex-fill">Todos</a>
                    <a th:href="@{/producto/ordenados}" class="btn btn-outline-primary flex-fill">₡ ↑</a>
                </div>
            </div>

            <!-- Tarjetas -->
            <div class="row g-4">
                <div class="col-sm-6 col-md-4 col-lg-3" th:each="p : ${productos}">
                    <div class="card card-producto shadow-sm h-100">

                        <!-- ✅ CORRECCIÓN:para URLs rotas -->
                        <img th:src="${p.imagenUrl != null and !#strings.isEmpty(p.imagenUrl)} ? ${p.imagenUrl} : 'https://placehold.co/400x185?text=Sin+imagen'"
                             alt="Imagen del producto"
                             onerror="this.onerror=null; this.src='https://placehold.co/400x185?text=Sin+imagen';">

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-bold mb-1" th:text="${p.nombre}"></h5>
                            <p class="card-text text-muted small flex-grow-1" th:text="${p.descripcion}"></p>
                            <h5 class="text-success fw-bold mb-3">
                                ₡<span th:text="${#numbers.formatInteger(p.precio, 0, 'COMMA')}"></span>
                            </h5>

                            <!-- Botón agregar: siempre visible para autenticados -->
                            <a th:href="@{/carrito/agregar/}+${p.id}" class="btn btn-warning fw-bold mb-2">
                                <i class="bi bi-cart-plus me-1"></i> Añadir al Pedido
                            </a>

                            <!-- Editar/Eliminar: SOLO ADMIN -->
                            <div class="d-flex gap-2"
                                 th:if="${session.usuarioLogueado != null and session.usuarioLogueado.esAdmin()}">
                                <a th:href="@{/producto/editar/{id}(id=${p.id})}" class="btn btn-info btn-sm flex-fill">
                                    <i class="bi bi-pencil"></i> Editar
                                </a>
                                <a th:href="@{/producto/eliminar/{id}(id=${p.id})}"
                                   class="btn btn-danger btn-sm flex-fill"
                                   onclick="return confirm('¿Eliminar este producto?')">
                                    <i class="bi bi-trash"></i> Eliminar
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12 text-center py-5 text-muted" th:if="${#lists.isEmpty(productos)}">
                    <i class="bi bi-search fs-1"></i>
                    <p class="mt-3 fs-5">No se encontraron productos.</p>
                    <a th:href="@{/producto/listado}" class="btn btn-outline-dark">Ver todos</a>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
