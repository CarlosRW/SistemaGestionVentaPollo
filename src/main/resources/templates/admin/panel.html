<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin | Pollos Hermanos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f3f4f6; }
    .avatar-sm {
      width:38px; height:38px; border-radius:50%; object-fit:cover;
      border:2px solid #16a34a;
    }
    .avatar-letter {
      width:38px; height:38px; border-radius:50%; background:#16a34a;
      color:white; display:inline-flex; align-items:center; justify-content:center;
      font-weight:bold; font-size:15px;
    }
    .badge-admin { background:#f59e0b; }
    .badge-cliente { background:#3b82f6; }
    .card-stat { border:none; border-radius:16px; }
  </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">
  <!-- Alertas -->
  <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${exito}"></span>
    <button class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
    <i class="bi bi-exclamation-circle-fill me-2"></i><span th:text="${error}"></span>
    <button class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="d-flex align-items-center gap-3 mb-4">
    <span style="font-size:2.5rem;">⚙️</span>
    <div>
      <h1 class="fw-bold mb-0" style="color:#14532d;">Panel de Administración</h1>
      <p class="text-muted mb-0">Gestión de usuarios y roles</p>
    </div>
  </div>

  <!-- Tarjetas de estadísticas rápidas -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card card-stat shadow-sm p-3 text-center">
        <div class="fs-1">👥</div>
        <h2 class="fw-bold" th:text="${usuarios.size()}">0</h2>
        <p class="text-muted mb-0">Usuarios totales</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-stat shadow-sm p-3 text-center">
        <div class="fs-1">🛡️</div>
        <h2 class="fw-bold text-warning"
            th:text="${#lists.size(usuarios.?[rol != null and rol.nombre == 'ADMIN'])}">0</h2>
        <p class="text-muted mb-0">Administradores</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card card-stat shadow-sm p-3 text-center">
        <div class="fs-1">🧑</div>
        <h2 class="fw-bold text-primary"
            th:text="${#lists.size(usuarios.?[rol != null and rol.nombre == 'CLIENTE'])}">0</h2>
        <p class="text-muted mb-0">Clientes</p>
      </div>
    </div>
  </div>

  <!-- Tabla de usuarios -->
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-header bg-white border-0 py-3 px-4 d-flex justify-content-between align-items-center">
      <h5 class="fw-bold mb-0">👥 Gestión de Usuarios</h5>
      <a th:href="@{/producto/listado}" class="btn btn-outline-success btn-sm">
        <i class="bi bi-arrow-left me-1"></i> Ir al Menú
      </a>
    </div>
    <div class="table-responsive px-2 pb-3">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Usuario</th>
            <th>Correo</th>
            <th class="text-center">Rol Actual</th>
            <th class="text-center">Cambiar Rol</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u, stat : ${usuarios}">
            <td class="text-muted small" th:text="${stat.index + 1}"></td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <img th:if="${u.fotoPerfilUrl != null and !#strings.isEmpty(u.fotoPerfilUrl)}"
                     th:src="${u.fotoPerfilUrl}" class="avatar-sm" alt="">
                <span th:if="${u.fotoPerfilUrl == null or #strings.isEmpty(u.fotoPerfilUrl)}"
                      class="avatar-letter"
                      th:text="${#strings.toUpperCase(#strings.substring(u.nombre,0,1))}"></span>
                <div>
                  <div class="fw-semibold" th:text="${u.nombre}"></div>
                  <div class="text-muted small">ID: <span th:text="${u.id}"></span></div>
                </div>
              </div>
            </td>
            <td class="text-muted small" th:text="${u.correo}"></td>
            <td class="text-center">
              <span th:if="${u.rol != null and u.rol.nombre == 'ADMIN'}"
                    class="badge badge-admin">👑 ADMIN</span>
              <span th:if="${u.rol != null and u.rol.nombre == 'CLIENTE'}"
                    class="badge badge-cliente">🧑 CLIENTE</span>
              <span th:if="${u.rol == null}" class="badge bg-secondary">Sin rol</span>
            </td>
            <td class="text-center">
              <!-- No permitir cambiarse el rol a sí mismo -->
              <span th:if="${u.id == session.usuarioLogueado.id}"
                    class="text-muted small fst-italic">Sos vos</span>
              <form th:if="${u.id != session.usuarioLogueado.id}"
                    th:action="@{/admin/asignar-rol}" method="post"
                    class="d-flex align-items-center justify-content-center gap-2">
                <input type="hidden" name="usuarioId" th:value="${u.id}">
                <select name="rolId" class="form-select form-select-sm" style="width:130px;">
                  <option th:each="r : ${roles}"
                          th:value="${r.id}"
                          th:text="${r.nombre}"
                          th:selected="${u.rol != null and u.rol.id == r.id}"></option>
                </select>
                <button type="submit" class="btn btn-sm btn-success">
                  <i class="bi bi-check-lg"></i>
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
