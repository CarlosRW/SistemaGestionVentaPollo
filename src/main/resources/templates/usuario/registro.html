<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Registro | Pollos Hermanos</title>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
                    url('https://images.unsplash.com/photo-1625604087024-7fb428fc4626?q=80&w=2070&auto=format&fit=crop');
                background-size: cover;
                background-position: center;
                margin: 0;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .contenedor {
                width: 400px;
                padding: 35px 30px;
                border-radius: 16px;
                background: rgba(255,255,255,.13);
                backdrop-filter: blur(8px);
                color: white;
                box-shadow: 0 4px 24px rgba(0,0,0,.35);
            }
            .form-control-custom {
                width: 100%;
                padding: 11px;
                margin: 6px 0 16px 0;
                border: none;
                border-radius: 8px;
                box-sizing: border-box;
                font-size: 14px;
            }
            label {
                display: block;
                margin-bottom: 4px;
                font-size: 14px;
            }
            .btn-registrar {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 8px;
                background-color: #c97b2a;
                color: white;
                font-size: 15px;
                cursor: pointer;
                margin-top: 10px;
            }
            .btn-link-back {
                width: 100%;
                padding: 11px;
                border: none;
                border-radius: 8px;
                background-color: #198754;
                color: white;
                font-size: 14px;
                text-decoration: none;
                display: block;
                text-align: center;
                margin-top: 10px;
                box-sizing: border-box;
            }
            .error {
                color: #ffb3b3;
                text-align: center;
                margin-bottom: 12px;
                font-size: 14px;
            }

            /* Logo */
            .logo-bb {
                margin-bottom: 20px;
                color: #17a34a;
                line-height: 1;
            }
            .fila-superior {
                display: flex;
                align-items: center;
                margin-left: 20px;
            }
            .fila-inferior {
                display: flex;
                align-items: center;
                margin-left: 85px;
                margin-top: -4px;
            }
            .caja {
                position: relative;
                background-color: #00a63c;
                color: white;
                font-size: 28px;
                padding: 8px 12px;
                display: inline-block;
                min-width: 50px;
                text-align: center;
                box-shadow: 0 0 8px rgba(0,0,0,.25);
            }
            .texto {
                font-size: 28px;
                margin-left: 6px;
                color: #17a34a;
            }
            .numero {
                position: absolute;
                color: white;
                font-size: 10px;
                font-weight: bold;
                top: 3px;
                right: 4px;
            }

            /* Zona foto */
            .foto-circle {
                width: 90px;
                height: 90px;
                border-radius: 50%;
                object-fit: cover;
                border: 3px solid #198754;
            }
            .foto-placeholder {
                width: 90px;
                height: 90px;
                border-radius: 50%;
                background: rgba(255,255,255,.2);
                border: 2px dashed rgba(255,255,255,.5);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 32px;
                cursor: pointer;
            }
            .upload-label {
                font-size: 12px;
                color: rgba(255,255,255,.75);
                text-align: center;
                margin-top: 5px;
                cursor: pointer;
            }
            #fotoFile {
                display: none;
            }
        </style>
    </head>
    <body>

        <div class="contenedor">

            <!-- Logo -->
            <div class="logo-bb">
                <div class="fila-superior">
                    <span class="caja">Po<span class="numero">84</span></span>
                    <span class="texto">llos</span>
                </div>
                <div class="fila-inferior">
                    <span class="caja">He<span class="numero">2</span></span>
                    <span class="texto">rmanos</span>
                </div>
            </div>

            <div th:if="${error}" class="error" th:text="${error}"></div>

            <form th:action="@{/usuario/registro}" th:object="${usuario}"
                  method="post" enctype="multipart/form-data">

                <!-- Foto de perfil centrada -->
                <div class="text-center mb-3">
                    <div onclick="document.getElementById('fotoFile').click()" id="fotoContainer">
                        <div class="foto-placeholder mx-auto" id="fotoPlaceholder">🧑</div>
                        <img id="fotoPreview" class="foto-circle mx-auto d-none" alt="Foto de perfil">
                    </div>
                    <input type="file" id="fotoFile" name="fotoFile"
                           accept="image/jpeg,image/png,image/webp"
                           onchange="previewFoto(event)">
                    <div class="upload-label" onclick="document.getElementById('fotoFile').click()">
                        📷 Subir foto de perfil <span style="opacity:.6;">(opcional)</span>
                    </div>
                </div>

                <label>Nombre</label>
                <input type="text" class="form-control-custom" th:field="*{nombre}" placeholder="Tu nombre completo" required>

                <label>Correo</label>
                <input type="email" class="form-control-custom" th:field="*{correo}" placeholder="correo@ejemplo.com" required>

                <label>Contraseña</label>
                <input type="password" class="form-control-custom" th:field="*{password}" placeholder="Mínimo 6 caracteres" required>

                <button type="submit" class="btn-registrar">Registrarse</button>
            </form>

            <a th:href="@{/usuario/login}" class="btn-link-back">← Volver al login</a>
        </div>

        <script>
            function previewFoto(event) {
                const archivo = event.target.files[0];
                if (!archivo)
                    return;
                if (archivo.size > 5 * 1024 * 1024) {
                    alert('La imagen supera los 5 MB.');
                    event.target.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('fotoPlaceholder').classList.add('d-none');
                    const img = document.getElementById('fotoPreview');
                    img.src = e.target.result;
                    img.classList.remove('d-none');
                };
                reader.readAsDataURL(archivo);
            }
        </script>

    </body>
</html>
